# Copy-paste CI for a Rust crate. See ../rust-release.md and ../supply-chain.md.
# Runs format + clippy (warnings = errors) + tests, and a separate cargo-audit job.
# SHA-pin every action; keep fresh via Dependabot's github-actions ecosystem.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only: CI neither writes to the repo nor needs any token scopes.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: format · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { persist-credentials: false }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  audit:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { persist-credentials: false }

      - name: Install cargo-audit
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
