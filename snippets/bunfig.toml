# Copy the [install] block into your repo's bunfig.toml.
# See ../supply-chain.md §1.

[install]
# Supply-chain hardening: refuse npm package versions published more recently
# than this threshold (in seconds). 604800 = 7 days. Install-time defense;
# the primary gate is the Dependabot cooldown in .github/dependabot.yml.
minimumReleaseAge = 604800
# Surgical, temporary exceptions when you must adopt something fresh:
# minimumReleaseAgeExcludes = ["some-pkg"]
