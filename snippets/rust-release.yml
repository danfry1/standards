# Copy-paste release pipeline for a Rust CLI/TUI. See ../rust-release.md for the rationale.
#
# Before using, replace these per-repo values (search for them):
#   <crate>   the package/bin name (e.g. hacker-news-tui) — matches `archive: $bin-$target`
#   <owner>   the GitHub account/org (e.g. danfry1)
#   targets   adjust the build matrix if you support a different platform set
#
# Two one-time HUMAN setups are required (no CLI for either):
#   * crates.io Trusted Publishing: crate Settings -> Trusted Publishing -> add
#       owner=<owner>, repo=<crate>, workflow=release.yml. Enables `publish-crate` (OIDC).
#   * A GitHub App with Contents: Read and write, installed on <owner>/homebrew-tap.
#       Store its App ID as the variable TAP_BUMP_APP_ID and its private key as the
#       secret TAP_BUMP_APP_PRIVATE_KEY on this repo. Enables `homebrew-bump`.
# No long-lived tokens are stored: crates.io uses OIDC, the tap push uses the App.
#
# SHAs below were current when written; keep them fresh via Dependabot's
# github-actions ecosystem (see ../supply-chain.md). Re-resolve any tag with:
#   gh api repos/<o>/<r>/commits/<tag> --jq .sha

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read   # read-only floor; jobs elevate per-scope

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { persist-credentials: false }
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: <crate>
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # mint the crates.io token via OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  homebrew-bump:
    name: Bump Homebrew formula
    needs: upload
    runs-on: ubuntu-latest
    permissions:
      contents: read   # read this release's assets; the tap push uses the App token
    steps:
      - name: Mint a tap token from the GitHub App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.TAP_BUMP_APP_ID }}
          private-key: ${{ secrets.TAP_BUMP_APP_PRIVATE_KEY }}
          owner: <owner>
          repositories: homebrew-tap

      - name: Check out the tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: <owner>/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: tap

      - name: Update the formula from the release checksums
        env:
          TAG: ${{ github.ref_name }}        # via env, never inlined into shell
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          gh release download "$TAG" --repo "$REPO" --pattern '*.sha256' --dir shas
          sha() { awk '{print $1}' "shas/<crate>-$1.sha256"; }
          mac=$(sha aarch64-apple-darwin)
          lx64=$(sha x86_64-unknown-linux-gnu)
          larm=$(sha aarch64-unknown-linux-gnu)

          formula=tap/<crate>.rb
          awk -v ver="$version" -v mac="$mac" -v lx64="$lx64" -v larm="$larm" '
            /^  version / { print "  version \"" ver "\""; next }
            /url "/ {
              gsub(/download\/v[0-9.]+\//, "download/v" ver "/")
              if      ($0 ~ /aarch64-apple-darwin/)      pend = mac
              else if ($0 ~ /x86_64-unknown-linux-gnu/)  pend = lx64
              else if ($0 ~ /aarch64-unknown-linux-gnu/) pend = larm
              print; next
            }
            /sha256 "/ && pend != "" {
              sub(/sha256 "[^"]*"/, "sha256 \"" pend "\"")
              print; pend = ""; next
            }
            { print }
          ' "$formula" > "$formula.new"
          mv "$formula.new" "$formula"

          echo "--- updated formula ---"
          cat "$formula"

      - name: Commit and push as the App bot
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi
          bot_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git commit -am "Update <crate> to ${TAG#v}"
          git push
