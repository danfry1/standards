name: OpenSSF Scorecard (reusable)

# Reusable OpenSSF Scorecard analysis. Call it from a repo:
#
#   jobs:
#     scorecard:
#       permissions: { security-events: write, id-token: write }
#       uses: danfry1/standards/.github/workflows/scorecard.yml@v1
#
# See ../../supply-chain.md §7.
on:
  workflow_call:
    inputs:
      publish_results:
        description: Publish results to the OpenSSF API (enables the badge).
        type: boolean
        default: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ inputs.publish_results }}

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          sarif_file: results.sarif
